name: Manual Build

on:
  workflow_dispatch:
    inputs:
      build_macos:
        description: "Build macOS .app"
        type: boolean
        default: false
      build_linux:
        description: "Build Linux standalone"
        type: boolean
        default: false
      build_windows:
        description: "Build Windows standalone + MSIX"
        type: boolean
        default: false
      version:
        description: "Version to stamp onto this test build (three-part, e.g. 2.0.1)"
        type: string
        default: "0.0.0"

jobs:
  macos:
    if: ${{ inputs.build_macos }}
    # Pin to a tagged release of the template repo, not @main, so a change
    # there can't silently break every project's build.
    uses: viraj-sh/dev-workflows/.github/workflows/build-macos-app.yml@v1.0.0
    with:
      app_version: ${{ inputs.version }}
      product_name: MYDYLMS
      company_name: viraj-sh
      file_description: "Effortlessly access DY LMS course materials"
      copyright_text: "Copyright © 2025 github.com/viraj-sh"

  linux:
    if: ${{ inputs.build_linux }}
    uses: viraj-sh/dev-workflows/.github/workflows/build-linux-standalone.yml@v1.0.0
    with:
      app_version: ${{ inputs.version }}
      product_name: MYDYLMS
      company_name: viraj-sh
      file_description: "Effortlessly access DY LMS course materials"
      copyright_text: "Copyright © 2025 github.com/viraj-sh"

  windows:
    if: ${{ inputs.build_windows }}
    uses: viraj-sh/dev-workflows/.github/workflows/build-windows.yml@v1.1.0
    with:
      app_version: ${{ inputs.version }}
      product_name: MYDYLMS
      company_name: viraj-sh
      file_description: "Effortlessly access DY LMS course materials"
      copyright_text: "Copyright © 2025 github.com/viraj-sh"
      executable_name: MYDYLMS
      build_msix: true
      publisher_display_name: viraj-sh
      display_name: "MYDY LMS Client (Unofficial)"
      build_installer: true
      iss_path: "backend/installer/mydylms.iss"
    secrets: inherit