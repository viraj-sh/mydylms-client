# .github/workflows/build-nuitka-action.yml
name: Manual Build (Nuitka-Action)

on:
  workflow_dispatch:
    inputs:
      build_mac:
        description: "Build macOS .app"
        type: boolean
        default: false
      build_linux:
        description: "Build Linux standalone"
        type: boolean
        default: false
      build_windows:
        description: "Build Windows standalone"
        type: boolean
        default: false

jobs:
  # ────────────────────────────────────────────────────────────
  #  macOS
  # ────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS .app
    runs-on: macos-latest
    if: ${{ inputs.build_mac }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop]"

      - name: Build macOS app (Nuitka-Action)
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: desktop.py
          working-directory: backend
          mode: app
          macos-app-name: desktop
          macos-app-icon: ../.github/assets/icon.icns
          lto: yes
          jobs: 4
          prefer-source-code: true
          assume-yes-for-downloads: true
          product-name: MYDYLMS
          company-name: viraj-sh
          file-description: "Effortlessly access DY LMS course materials"
          copyright: "Copyright © 2025 github.com/viraj-sh"
          file-version: "2.0.0"
          product-version: "2.0.0"
          disable-console: true
          disable-plugins: pywebview
          include-package-data: |
            fastapi
            uvicorn
            pydantic_settings
            httpx
            qtpy
            webview
          include-data-dir: |
            app/static=static
          output-dir: dist
      - name: Create tarball (preserves symlinks)
        working-directory: backend
        run: tar -czf desktop.app.tar.gz -C dist desktop.app

      - name: Upload macOS .app (tarball)
        uses: actions/upload-artifact@v4
        with:
          name: macOS-desktop
          path: backend/desktop.app.tar.gz

  # ────────────────────────────────────────────────────────────
  #  Linux
  # ────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux standalone
    runs-on: ubuntu-latest
    if: ${{ inputs.build_linux }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop]"

      - name: Build Linux standalone (Nuitka-Action)
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: desktop.py
          working-directory: backend
          mode: standalone
          lto: yes
          jobs: 4
          prefer-source-code: true
          assume-yes-for-downloads: true
          product-name: MYDYLMS
          company-name: viraj-sh
          file-description: "Effortlessly access DY LMS course materials"
          copyright: "Copyright © 2025 github.com/viraj-sh"
          file-version: "2.0.0"
          disable-console: true
          disable-plugins: pywebview
          include-package-data: |
            fastapi
            uvicorn
            pydantic_settings
            httpx
            qtpy
            webview
          include-data-dir: |
            app/static=static
          output-dir: dist

      - name: Upload Linux build folder
        uses: actions/upload-artifact@v4
        with:
          name: Linux-desktop
          path: backend/dist/desktop.dist
          include-hidden-files: true

  # ────────────────────────────────────────────────────────────
  #  Windows
  # ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows standalone
    runs-on: windows-latest
    if: ${{ inputs.build_windows }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop]"

      - name: Build Windows standalone (Nuitka-Action)
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: desktop.py
          working-directory: backend
          mode: standalone
          lto: yes
          jobs: 4
          prefer-source-code: true
          assume-yes-for-downloads: true
          product-name: MYDYLMS
          company-name: viraj-sh
          file-description: "Effortlessly access DY LMS course materials"
          copyright: "Copyright © 2025 github.com/viraj-sh"
          file-version: "2.0.0"
          product-version: "2.0.0"
          windows-console-mode: disable
          windows-icon-from-ico: ../.github/assets/icon.ico
          disable-plugins: pywebview
          include-module: |
            webview.platforms.edgechromium
            webview.platforms.win32
          include-package-data: |
            fastapi
            uvicorn
            pydantic_settings
            httpx
            webview
          include-data-dir: |
            app/static=static
          output-dir: dist

      - name: Upload Windows build folder
        uses: actions/upload-artifact@v4
        with:
          name: Windows-desktop
          path: backend/dist/desktop.dist
          include-hidden-files: true
